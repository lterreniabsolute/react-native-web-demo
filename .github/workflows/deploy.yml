name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:        # consente il trigger manuale dalla UI di GitHub

permissions:
  contents: read
  pages: write
  id-token: write

# Evita deploy paralleli: aspetta che il precedente finisca.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Installa dipendenze
        run: npm ci

      - name: Build web statico
        run: npx expo export --platform web
        env:
          # Imposta il sotto-percorso GitHub Pages = /nome-repo/
          # Se rinomini il repo, aggiorna questo valore.
          EXPO_BASE_URL: /${{ github.event.repository.name }}/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
